<p class="font-body-md text-body-md text-on-surface-variant">Ingrese los datos para confirmar la presencia en la sesión académica.</p>

<form action="#" class="space-y-6" method="POST">
<!-- Input: Nombre -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface-variant" for="nombre">Nombre Completo</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-variant">person</span>
<input class="w-full bg-white/50 border border-white/50 rounded-lg pl-10 pr-4 py-3 font-body-md text-body-md text-on-surface placeholder:text-outline shadow-sm focus:bg-white/80 focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all duration-200 outline-none" id="nombre" name="nombre" placeholder="Ej. Ana García" required="" type="text"/>
</div>
</div>
<!-- Input: Cédula -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface-variant" for="cedula">Cédula de Identidad</label>

</div>

<option disabled="" selected="" value="">Seleccione una sección</option>
<option value="A1">Sección A1</option>

<option value="C3">Sección C3</option>
